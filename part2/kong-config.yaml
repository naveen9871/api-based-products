_format_version: "3.0"
_transform: true

services:
  - name: record-label-service
    url: http://artist-api-service:8080
    routes:
      - name: artist-route
        paths:
          - /artists
    plugins:
      - name: rate-limiting
        config:
          minute: 5
          policy: local
      - name: request-size-limiting
        config:
          allowed_payload_size: 1 # size in megabytes
